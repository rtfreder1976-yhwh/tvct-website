<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA985"/>
      <stop offset="100%" style="stop-color:#FFC67D"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#brand-gradient)"/>
  <text x="16" y="22" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">V</text>
  <!-- Twinkle sparkles. Firefox animates these in the tab favicon; other browsers show the static first frame. -->
  <circle cx="24" cy="8" r="3" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3.4;3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="26" cy="10" r="1.5" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;1.9;1.5" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
