name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: vercel_preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          vercel_protection_bypass_header: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Build bypass-suffixed URLs
        id: urls
        env:
          BASE: ${{ steps.vercel_preview.outputs.url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          Q="x-vercel-protection-bypass=$BYPASS&x-vercel-set-bypass-cookie=true"
          {
            echo "home=$BASE/?$Q"
            echo "house=$BASE/services/house-cleaning?$Q"
            echo "quote=$BASE/get-quote?$Q"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI against preview
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ steps.urls.outputs.home }}
            ${{ steps.urls.outputs.house }}
            ${{ steps.urls.outputs.quote }}
          uploadArtifacts: true
          temporaryPublicStorage: false
          budgetPath: .github/lighthouse-budget.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
