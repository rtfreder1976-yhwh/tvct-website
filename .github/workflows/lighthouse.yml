name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: vercel_preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      - name: Run Lighthouse CI against preview
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ steps.vercel_preview.outputs.url }}
            ${{ steps.vercel_preview.outputs.url }}/services/house-cleaning
            ${{ steps.vercel_preview.outputs.url }}/get-quote
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
